name: Reusable Tests

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        description: Specific Node.js version for a single test run.
        default: 24.x
      use-matrix:
        required: false
        type: boolean
        description: Whether to run tests on multiple supported Node.js versions.
        default: false

jobs:
  test-matrix:
    if: ${{ inputs.use-matrix == true }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers and system dependencies
        run: npx playwright install --with-deps

      - name: Run unit tests
        run: npm test

  test-single:
    if: ${{ inputs.use-matrix == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers and system dependencies
        run: npx playwright install --with-deps

      - name: Run unit tests
        run: npm test
